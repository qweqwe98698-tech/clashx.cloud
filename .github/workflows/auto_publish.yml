name: Daily Article Auto Publish

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午 10 点 (UTC 2)
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate Daily Article
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_daily_article.cjs


      - name: Build Astro Site
        run: npm run build

      - name: Commit Data Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/
          git commit -m "Auto-generated daily article & Apple ID updates" || echo "No changes to commit"
          git push

      - name: 📂 Sync files to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/clashx.cloud/
          local-dir: ./dist/
          port: 21
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
