name: Daily Article Auto Publish

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午 10 点 (UTC 2)
  workflow_dispatch: # 允许手动触发 (和您截图里一样)

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'


      - name: Generate Daily Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate_daily_article.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-generated daily article" -a || echo "No changes to commit"
          git push

      - name: 📂 Sync files to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: clashx.cloud/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
